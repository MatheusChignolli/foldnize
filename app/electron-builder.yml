appId: com.foldnize.desktop
productName: Foldnize
copyright: Copyright © Matheus Chignolli

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json

asar: true

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: null
  entitlementsInherit: null

dmg:
  title: Foldnize
  background: dmg-background.png
  iconSize: 128
  window:
    width: 540
    height: 380
  contents:
    - x: 135
      y: 245
    - x: 405
      y: 245
      type: link
      path: /Applications

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: assets/icon.png
  category: Utility
  maintainer: Matheus Chignolli
  target:
    - AppImage
    - deb

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish: null
