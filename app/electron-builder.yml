appId: com.foldnize.desktop
productName: Foldnize
copyright: Copyright © Matheus Chignolli

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json

asar: true

mac:
  category: public.app-category.productivity
  # Preserve the Icon Composer asset for the native layered/glass Dock icon.
  # electron-builder also derives an icns fallback for older macOS versions.
  icon: assets/Foldnize.icon
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: null
  entitlementsInherit: null

dmg:
  title: Foldnize
  background: dmg-background.png
  iconSize: 112
  window:
    width: 540
    height: 380
  contents:
    - x: 145
      y: 225
    - x: 395
      y: 225
      type: link
      path: /Applications

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64

linux:
  icon: assets/icon.png
  category: Utility
  maintainer: Matheus Chignolli
  target:
    - AppImage
    - deb

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish: null
