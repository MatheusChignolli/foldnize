<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12151e" />
      <stop offset="100%" stop-color="#0a0c12" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#6c8cff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#6c8cff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c8cff" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#a8baff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#6c8cff" stop-opacity="0.35" />
    </linearGradient>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path
        d="M 96 0 L 0 0 0 96"
        fill="none"
        stroke="#ffffff"
        stroke-opacity="0.025"
        stroke-width="2"
      />
    </pattern>
  </defs>

  <rect width="1080" height="760" fill="url(#bg)" />
  <rect width="1080" height="760" fill="url(#glow)" />
  <rect width="1080" height="760" fill="url(#grid)" />

  <!-- Title -->
  <text
    x="540"
    y="118"
    text-anchor="middle"
    fill="#f0f2f7"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
  >
    Install Foldnize
  </text>
  <text
    x="540"
    y="172"
    text-anchor="middle"
    fill="#8a92a6"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="28"
    font-weight="500"
  >
    Drag into Applications to install
  </text>

  <!-- Drop zones (icon centers at 270,490 and 810,490) -->
  <rect
    x="150"
    y="370"
    width="240"
    height="240"
    rx="36"
    fill="#161922"
    stroke="#343b4d"
    stroke-width="2"
    stroke-opacity="0.9"
  />
  <rect
    x="690"
    y="370"
    width="240"
    height="240"
    rx="36"
    fill="#161922"
    stroke="#343b4d"
    stroke-width="2"
    stroke-opacity="0.9"
  />

  <!-- Arrow between zones -->
  <line
    x1="420"
    y1="490"
    x2="650"
    y2="490"
    stroke="url(#arrow)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-dasharray="12 14"
  />
  <path
    d="M650 490 L622 472 M650 490 L622 508"
    fill="none"
    stroke="#a8baff"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Zone labels -->
  <text
    x="270"
    y="660"
    text-anchor="middle"
    fill="#8a92a6"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="24"
    font-weight="600"
    letter-spacing="0.08em"
  >
    FOLDNIZE
  </text>
  <text
    x="810"
    y="660"
    text-anchor="middle"
    fill="#8a92a6"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="24"
    font-weight="600"
    letter-spacing="0.08em"
  >
    APPLICATIONS
  </text>

  <!-- Footer -->
  <text
    x="540"
    y="728"
    text-anchor="middle"
    fill="#5e6577"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="20"
    font-weight="500"
  >
    Local-first · Open source · foldnize.com
  </text>
</svg>
