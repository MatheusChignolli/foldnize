name: Release Foldnize app

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: "App version to verify in app/package.json (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

defaults:
  run:
    working-directory: app

jobs:
  verify-version:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read package version
        id: version
        working-directory: app
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Match GitHub Release tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          EXPECTED="foldnize-app-v${VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "Release tag must be $EXPECTED (got $TAG)"
            exit 1
          fi

      - name: Match manual input
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          INPUT="${{ github.event.inputs.version }}"
          if [ "$INPUT" != "$VERSION" ]; then
            echo "Input version $INPUT does not match app/package.json ($VERSION)"
            exit 1
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: verify-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Icon Composer assets require Xcode 26's actool.
          - os: macos-26
            platform: macos
            electron_flags: --mac --config.mac.forceCodeSigning=true --config.mac.notarize=true
          - os: windows-latest
            platform: windows
            electron_flags: --win
          - os: ubuntu-latest
            platform: linux
            electron_flags: --linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            library/package-lock.json

      - name: Build Foldnize library
        working-directory: library
        run: npm ci && npm run build

      - name: Install app dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Prepare macOS signing credentials
        if: matrix.platform == 'macos'
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID_SECRET: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_SECRET: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          node -e "const fs=require('fs'); for (const [name,file] of [['MAC_CERTIFICATE_BASE64','foldnize-signing.p12'],['APPLE_API_KEY_BASE64','AuthKey.p8']]) { const value=process.env[name]; if (!value) throw new Error('Missing GitHub secret: '+name); fs.writeFileSync(process.env.RUNNER_TEMP+'/'+file, Buffer.from(value,'base64')); }"
          test -n "$MAC_CERTIFICATE_PASSWORD"
          test -n "$APPLE_API_KEY_ID_SECRET"
          test -n "$APPLE_API_ISSUER_SECRET"
          echo "CSC_LINK=$RUNNER_TEMP/foldnize-signing.p12" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MAC_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_SECRET" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_SECRET" >> "$GITHUB_ENV"

      - name: Package app
        run: npm run build && npm run icons:build && npm run dmg:build && npx electron-builder ${{ matrix.electron_flags }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foldnize-${{ matrix.platform }}
          path: |
            app/release/*.dmg
            app/release/*.zip
            app/release/*.exe
            app/release/*.AppImage
            app/release/*.deb
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: [verify-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: foldnize-app-v${{ needs.verify-version.outputs.version }}
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
