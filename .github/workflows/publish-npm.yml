name: Publish foldnize to npm

on:
  # Push a tag that matches the library version, e.g. foldnize-v1.0.0
  push:
    tags:
      - "foldnize-v*"

  # Run manually from GitHub → Actions → "Publish foldnize to npm"
  workflow_dispatch:

  # Optional: publish when a GitHub Release is published (tag can be any name)
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: library

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: library/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/foldnize-v')
        run: |
          TAG="${GITHUB_REF#refs/tags/foldnize-v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag foldnize-v$TAG does not match library/package.json version $VERSION"
            exit 1
          fi
          echo "Publishing foldnize@$VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
