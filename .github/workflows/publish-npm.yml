name: Publish foldnize to npm

on:
  # Publish once when a GitHub Release is published (not on tag push alone)
  release:
    types: [published]

  # Run manually from GitHub → Actions → "Publish foldnize to npm"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: library

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: library/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PREFIX="foldnize-v"
          case "$TAG" in
            ${PREFIX}*) ;;
            *)
              echo "Release tag must be ${PREFIX}* (got: $TAG)"
              exit 1
              ;;
          esac
          VERSION="${TAG#${PREFIX}}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "Release tag $TAG does not match library/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing foldnize@$PKG_VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
