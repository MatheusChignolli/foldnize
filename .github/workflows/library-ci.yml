name: Library CI

on:
  push:
    branches: [main]
    paths:
      - "library/**"
      - ".github/workflows/library-ci.yml"
  pull_request:
    paths:
      - "library/**"
      - ".github/workflows/library-ci.yml"

defaults:
  run:
    working-directory: library

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: library/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
